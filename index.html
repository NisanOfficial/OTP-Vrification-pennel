<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NisanX OTP Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #0f172a;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.bg-animation {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 70%);
}

.container {
  width: 100%;
  max-width: 450px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  padding: 40px;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
}

.logo {
  text-align: center;
  margin-bottom: 30px;
}

.logo img {
  width: 60px;
  height: 60px;
  border-radius: 16px;
  margin-bottom: 12px;
}

.logo h1 {
  font-size: 24px;
  font-weight: 700;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  font-size: 14px;
  color: rgba(255, 255, 255, 0.7);
}

.form-group input {
  width: 100%;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  padding: 14px 16px;
  color: #fff;
  font-size: 16px;
  outline: none;
  transition: 0.3s;
}

.form-group input:focus {
  border-color: #3b82f6;
  background: rgba(59, 130, 246, 0.1);
}

.btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  color: #fff;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.otp-inputs {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin: 20px 0;
}

.otp-inputs input {
  width: 50px;
  height: 60px;
  text-align: center;
  font-size: 24px;
  font-weight: 600;
}

.hidden {
  display: none;
}

.alert {
  padding: 12px 16px;
  border-radius: 12px;
  margin-bottom: 20px;
  font-size: 14px;
}

.alert.success {
  background: rgba(34, 197, 94, 0.2);
  border: 1px solid rgba(34, 197, 94, 0.3);
  color: #22c55e;
}

.alert.error {
  background: rgba(239, 68, 68, 0.2);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #ef4444;
}

.resend {
  text-align: center;
  margin-top: 16px;
  font-size: 14px;
  color: rgba(255, 255, 255, 0.6);
}

.resend a {
  color: #3b82f6;
  cursor: pointer;
  text-decoration: none;
}

.user-info {
  text-align: center;
}

.user-info h2 {
  margin-bottom: 12px;
}

.user-info p {
  color: rgba(255, 255, 255, 0.6);
  margin-bottom: 20px;
}
</style>
</head>
<body>

<div class="bg-animation"></div>

<div class="container">
  <!-- Phone Input Form -->
  <div id="phoneForm">
    <div class="logo">
      <img src="NisanX.jpg" alt="NisanX">
      <h1>NisanX OTP Login</h1>
    </div>

    <div id="alertBox"></div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phoneInput" placeholder="+880 17XXXXXXXX" required>
    </div>

    <button class="btn" id="sendOtpBtn" onclick="sendOTP()">Send OTP</button>

    <div id="recaptcha-container"></div>
  </div>

  <!-- OTP Input Form -->
  <div id="otpForm" class="hidden">
    <div class="logo">
      <h1>Enter OTP</h1>
      <p style="color: rgba(255,255,255,0.6); font-size: 14px;">Code sent to <span id="phoneDisplay"></span></p>
    </div>

    <div id="alertBox2"></div>

    <div class="otp-inputs">
      <input type="text" maxlength="1" onkeyup="moveNext(this, 0)">
      <input type="text" maxlength="1" onkeyup="moveNext(this, 1)">
      <input type="text" maxlength="1" onkeyup="moveNext(this, 2)">
      <input type="text" maxlength="1" onkeyup="moveNext(this, 3)">
      <input type="text" maxlength="1" onkeyup="moveNext(this, 4)">
      <input type="text" maxlength="1" onkeyup="moveNext(this, 5)">
    </div>

    <button class="btn" onclick="verifyOTP()">Verify OTP</button>

    <div class="resend">
      Didn't get code? <a onclick="sendOTP()">Resend OTP</a>
    </div>
  </div>

  <!-- Success Form -->
  <div id="successForm" class="hidden">
    <div class="user-info">
      <h2>✓ Login Successful</h2>
      <p>Welcome! Your phone is verified.</p>
      <p id="userPhone" style="font-weight: 600; color: #3b82f6;"></p>
      <button class="btn" onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// ================== CONFIG ==================
// Replace with your Firebase config from console.firebase.google.com
const firebaseConfig = {
  apiKey: "AIzaSyC6DeWkKOiynidZDftDc_aMuLuNdIB4cNQ",
  authDomain: "nisanx-otp.firebaseapp.com",
  projectId: "nisanx-otp",
  storageBucket: "nisanx-otp.firebasestorage.app",
  messagingSenderId: "315362812085",
  appId: "1:315362812085:web:56941ff16dff5a69e85efc",
  measurementId: "G-WT7FT9PMVF"
};
// ============================================

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let confirmationResult;
let recaptchaVerifier;

// Initialize reCAPTCHA
window.onload = () => {
  recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
    'size': 'invisible',
    'callback': () => {}
  });
};

// Send OTP
window.sendOTP = async () => {
  const phone = document.getElementById('phoneInput').value;
  
  if (!phone.startsWith('+')) {
    showAlert('Please enter number with country code. Example: +8801712345678', 'error');
    return;
  }

  document.getElementById('sendOtpBtn').disabled = true;
  
  try {
    confirmationResult = await signInWithPhoneNumber(auth, phone, recaptchaVerifier);
    document.getElementById('phoneForm').classList.add('hidden');
    document.getElementById('otpForm').classList.remove('hidden');
    document.getElementById('phoneDisplay').textContent = phone;
    showAlert('OTP sent successfully!', 'success', 'alertBox2');
  } catch (error) {
    showAlert(error.message, 'error');
    document.getElementById('sendOtpBtn').disabled = false;
  }
};

// Verify OTP
window.verifyOTP = async () => {
  const otp = Array.from(document.querySelectorAll('.otp-inputs input'))
    .map(input => input.value)
    .join('');

  if (otp.length !== 6) {
    showAlert('Please enter 6 digit OTP', 'error', 'alertBox2');
    return;
  }

  try {
    const result = await confirmationResult.confirm(otp);
    const user = result.user;
    
    document.getElementById('otpForm').classList.add('hidden');
    document.getElementById('successForm').classList.remove('hidden');
    document.getElementById('userPhone').textContent = user.phoneNumber;
  } catch (error) {
    showAlert('Invalid OTP. Try again.', 'error', 'alertBox2');
  }
};

// Logout
window.logout = async () => {
  await signOut(auth);
  location.reload();
};

// Auto move to next OTP input
window.moveNext = (current, index) => {
  if (current.value.length === 1) {
    const next = document.querySelectorAll('.otp-inputs input')[index + 1];
    if (next) next.focus();
  }
  
  if (current.value.length === 0) {
    const prev = document.querySelectorAll('.otp-inputs input')[index - 1];
    if (prev) prev.focus();
  }
};

// Show Alert
function showAlert(message, type, boxId = 'alertBox') {
  const alertBox = document.getElementById(boxId);
  alertBox.innerHTML = `<div class="alert ${type}">${message}</div>`;
  setTimeout(() => alertBox.innerHTML = '', 4000);
}
</script>

</body>
</html>
